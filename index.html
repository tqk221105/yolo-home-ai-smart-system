<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yolo Home - Smarthome Chọn Nền Tảng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #020617;
            color: #f8fafc;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        .logo {
            margin-bottom: 24px;
        }

        h2 {
            font-size: 1.75rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        .card:hover {
            border-color: #3b82f6;
            background: #1e293b;
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.5);
        }

        .card svg {
            width: 48px;
            height: 48px;
            stroke: #60a5fa;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 0.875rem;
            color: #64748b;
        }

        @media (max-width: 600px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
        </div>
        <h2>Yolo Home Mockups</h2>
        <p>Vui lòng chọn giao diện (platform) bạn muốn trải nghiệm</p>

        <div class="cards">
            <!-- PC Version -->
            <a href="mockup/01 dashboard_tong_quan.html" class="card">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
                <div class="card-title">Giao diện PC</div>
                <div class="card-desc">Bảng điều khiển tổng hợp dành cho màn hình lớn</div>
            </a>
            <!-- Mobile Version -->
            <a href="mockup/nhan_dien_khuon_mat.mobile.html" class="card">
                <svg viewBox="0 0 24 24">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                    <line x1="12" y1="18" x2="12.01" y2="18" />
                </svg>
                <div class="card-title">Giao diện Mobile</div>
                <div class="card-desc">Ứng dụng di động để theo dõi và cảnh báo</div>
            </a>
        </div>
    </div>
</body>

</html>
